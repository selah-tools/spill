name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fast lint
        run: pnpm lint:fast

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm check

      - name: Validate AGENTS.md references
        run: pnpm validate:agents

      - name: Validate feature flags
        run: pnpm flags:check

      - name: Test with coverage and reports
        run: pnpm test:ci

      - name: Report test performance
        if: always()
        run: node scripts/check-test-performance.mjs

      - name: File-size budgets
        run: pnpm size:check

      - name: Tech debt scan
        run: pnpm tech-debt

      - name: Unused dependency scan
        run: pnpm unused:deps

      - name: Duplicate code scan
        run: pnpm duplicate-code

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: |
            coverage
            reports
          if-no-files-found: ignore
