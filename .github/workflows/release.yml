name: Release Plan

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update release PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: 'chore: release plan'
          title: 'chore: release plan'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLAN_GITHUB_TOKEN != '' && secrets.RELEASE_PLAN_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
