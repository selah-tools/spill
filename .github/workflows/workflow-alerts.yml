name: Workflow Alerts

on:
  workflow_run:
    workflows:
      - Quality
      - Integration
      - Vercel Deploy
      - Release Plan
    types:
      - completed

permissions:
  contents: read
  issues: write

jobs:
  alert:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = context.payload.workflow_run.name
            const branch = context.payload.workflow_run.head_branch
            const url = context.payload.workflow_run.html_url
            const sha = context.payload.workflow_run.head_sha.slice(0, 7)
            const runId = context.payload.workflow_run.id
            const title = `workflow alert: ${workflow} failed on ${branch}`
            const { owner, repo } = context.repo

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${title}"`,
            })

            const artifacts = `https://github.com/${owner}/${repo}/actions/runs/${runId}`
            const body = [
              `Workflow **${workflow}** failed on \`${branch}\`.`,
              '',
              `- Commit: \`${sha}\``,
              `- Run: ${url}`,
              `- Artifacts: ${artifacts}`,
              '',
              '### Response checklist',
              '',
              '1. Open the failing run link above.',
              '2. Identify the first failing step.',
              '3. Fix locally with `pnpm quality` (or the relevant narrow command).',
              '4. Push the fix and confirm CI passes.',
              '',
              'This issue was created automatically by `.github/workflows/workflow-alerts.yml`.',
            ].join('\n')

            if (existing.data.items.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.data.items[0].number,
                body,
              })
              return
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['ci'],
            })
