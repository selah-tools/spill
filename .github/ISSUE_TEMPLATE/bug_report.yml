name: Bug report
description: Report a defect in spill
title: 'bug: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the URL, filters, and prompt if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: request-id
    attributes:
      label: X-Request-Id
      description: Include this when the issue involves an API failure.
