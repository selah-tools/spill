<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Spill — Offline</title>
    <meta name="theme-color" content="#f3f2f0" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f2f0;
        --surface: #faf8f4;
        --ink: #21312d;
        --muted: #66756f;
        --line: rgba(33, 49, 45, 0.14);
        --accent: #c67d4d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, #fcfbf8 0%, var(--bg) 58%);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
      .shell {
        width: min(100%, 420px);
        padding: 28px;
        border-radius: 28px;
        background: color-mix(in srgb, white 74%, var(--surface));
        border: 1px solid var(--line);
        box-shadow: 0 18px 40px rgba(26, 38, 35, 0.08);
      }
      .mark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .mark-dot {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(198, 125, 77, 0.14);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
        line-height: 1.1;
        letter-spacing: -0.03em;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        background: var(--ink);
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="mark"><span class="mark-dot"></span><span>Spill</span></div>
      <h1>You’re offline.</h1>
      <p>
        Spill can still reopen from your home screen once the app shell is
        cached, but this page needs a connection right now. Reconnect, then try
        again.
      </p>
      <a href="./">Try again</a>
    </main>
  </body>
</html>
